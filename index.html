
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Go Focus AI | AI Agents for Trading Mentors & Info Product Creators</title>
  
  <meta name="description" content="Go Focus AI builds AI-powered sales agents and automations for Trading Mentors and Info Product Creators. Automate lead conversion, booking, and sales — 24/7." />
  <meta name="author" content="Go Focus AI" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://gofocus.ai/" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Critical CSS -->
  <style>
    /* Minimal critical CSS for fast initial render */
    body {
      background: #050A14;
      color: #cecece;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050A14;
      z-index: 9999;
    }
  </style>
  
  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Go Focus AI | Automated Sales Agents for Trading Mentors & Course Creators" />
  <meta property="og:description" content="Automate your customer journey with AI. Book more calls, close more sales, and grow on autopilot." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://gofocus.ai/" />
  <meta property="og:image" content="https://gofocus.ai/path-to-your-opengraph-image.png" />
  
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@gofocusai" />
  <meta name="twitter:title" content="Go Focus AI | AI Sales Automation for Trading Mentors & Info Creators" />
  <meta name="twitter:description" content="Build your AI sales agent. Book more qualified calls and close sales automatically. Designed for trading mentors and info product businesses." />
  <meta name="twitter:image" content="https://gofocus.ai/path-to-your-twitter-image.png" />
  
</head>

<body>
  <!-- Initial loading indicator -->
  <div class="loading-screen" id="initial-loader">
    <div style="text-align: center;">
      <img src="/lovable-uploads/856246fc-384e-4f3b-b0de-1a21af8dbc2d.png" alt="Go Focus AI Logo" style="width: 120px; height: 120px; object-fit: contain;" />
      <p style="margin-top: 12px; font-size: 14px;">Loading...</p>
    </div>
  </div>
  
  <div id="root"></div>

  <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->
  <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>
  <script type="module" src="/src/main.tsx"></script>
  
  <script>
    // Remove initial loader once React app is mounted
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.4s ease';
          setTimeout(function() {
            if (loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, 400);
        }
      }, 500);
    });
  </script>
</body>
</html>
